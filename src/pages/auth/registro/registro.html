<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Store - Registro</title>
  <link rel="stylesheet" href="/src/style.css">
</head>

<body>
  <div class="auth-page">
    <div class="auth-logo">Food Store</div>
    <h1>Crear Cuenta</h1>

    <form id="regForm">
      <div class="form-group">
        <label for="name">Nombre</label>
        <input type="text" id="name" name="name" autocomplete="off" placeholder="Tu nombre" required>
        <span class="form-error" id="nameError"></span>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="off" placeholder="ejemplo@correo.com" required>
        <span class="form-error" id="emailError"></span>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" autocomplete="off" placeholder="••••••••" required>
        <span class="form-error" id="passwordError"></span>
      </div>
      <div class="form-group">
        <label for="rol">Rol</label>
        <select name="rol" id="rol" required>
          <option value="">Seleccione un rol</option>
          <option value="client">Cliente</option>
          <option value="admin">Admin</option>
        </select>
        <span class="form-error" id="rolError"></span>
      </div>

      <button type="submit" class="btn-primary">Registrarse</button>
    </form>

    <p class="auth-link">¿Ya tenés cuenta? <a href="/src/pages/auth/login/login.html">Iniciar sesión</a></p>
  </div>

  <script type="module" src="./registro.ts"></script>
</body>

</html>
