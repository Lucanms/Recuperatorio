<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Store - Carrito</title>
  <link rel="stylesheet" href="/src/style.css">
</head>

<body>
  <header class="store-header">
    <div class="store-header-inner">
      <h1 class="store-logo">Food Store</h1>
      <nav class="store-nav">
        <a href="/src/pages/store/home/home.html" class="cart-link">
          ← Volver al catálogo
        </a>
      </nav>
    </div>
  </header>

  <main class="cart-page">
    <h2>Tu Carrito</h2>

    <div class="cart-items" id="cartItems">
    </div>

    <p class="empty-cart" id="emptyCart" style="display: none;">
      El carrito está vacío.
    </p>

    <div class="cart-summary" id="cartSummary" style="display: none;">
      <div class="cart-total">
        <span>Total:</span>
        <span id="cartTotal">$0.00</span>
      </div>
      <div class="cart-actions">
        <button class="btn-clear-cart" id="clearCartBtn">Vaciar carrito</button>
        <button class="btn-checkout" disabled>Finalizar compra</button>
      </div>
    </div>
  </main>

  <script type="module" src="./cart.ts"></script>
</body>

</html>
